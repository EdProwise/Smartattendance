name: smart_attendance
description: Smart Attendance System with Face Recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Image picker (camera + gallery on mobile; web uses custom WebCameraService)
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.2.7

  # UI
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Intl / date formatting
  intl: ^0.19.0

  # Excel import/export
  excel: ^4.0.6

  # Local session storage
  shared_preferences: ^2.3.2

  # File I/O (mobile)
  path_provider: ^2.1.4
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#29B6F6"
  adaptive_icon_foreground: "assets/launcher_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
