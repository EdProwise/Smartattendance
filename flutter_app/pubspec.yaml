name: smart_attendance
description: Smart Attendance System with Face Recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Camera & Image picker
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.2.7

  # UI
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Intl / date formatting
  intl: ^0.19.0

  # Excel import/export
  excel: ^4.0.6

  # Local session storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
